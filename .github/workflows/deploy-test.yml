name: Deploy to Test Environment (FTP)

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:  # 手動実行も可能

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, mysqli
        
    - name: Create deployment package
      run: |
        echo "📦 デプロイパッケージを作成中..."
        
        # 必要なディレクトリを作成
        mkdir -p uploads temp logs cache

        echo "✅ デプロイパッケージ作成完了"
        
    - name: Deploy to Test Server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ${{ secrets.FTP_SERVER_DIR }}
        security: loose
        timeout: 60000
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.github/**
          **/tests/**
          **/.env
          **/README.md
          **/deploy-package/**
        
    - name: Verify deployment
      run: |
        echo "🌐 テスト環境URL:"
        echo "  - 既存システム: https://twinklemark.xsrv.jp/Smiley/meal-delivery/smiley-kitchen/billing-system/"
        echo "  - 注文システム: https://twinklemark.xsrv.jp/Smiley/meal-delivery/smiley-kitchen/order/"
        echo "✅ FTPデプロイ完了"

    - name: Send success notification
      if: success()
      run: |
        echo "🎉 テスト環境へのFTPデプロイが成功しました！"
        echo "📍 確認URL:"
        echo "  - 既存システム: https://twinklemark.xsrv.jp/Smiley/meal-delivery/smiley-kitchen/billing-system/"
        echo "  - 注文システム: https://twinklemark.xsrv.jp/Smiley/meal-delivery/smiley-kitchen/order/"
        echo "📝 次のステップ: データベース接続確認"
        
    - name: Send failure notification  
      if: failure()
      run: |
        echo "❌ テスト環境へのFTPデプロイが失敗しました"
        echo "🔍 ログを確認してFTP設定を見直してください"
